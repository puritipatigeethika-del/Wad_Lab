<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="d-flex justify-content-center align-items-center vh-100 bg-light">

<div class="card p-4" style="width:320px;">
    <h3 class="text-center mb-3">Register</h3>

    <input id="u" class="form-control mb-2" placeholder="Username">
    <input id="p" type="password" class="form-control mb-3" placeholder="Password">

    <button class="btn btn-success w-100" onclick="reg()">Register</button>

    <p class="mt-3 text-center">
        <a href="login.html">Back to login</a>
    </p>
</div>

<script>
function reg(){
  localStorage.u = u.value;
  localStorage.p = p.value;
  alert("Registered!");
  location = "login.html";
}
</script>

</body>
</html>
