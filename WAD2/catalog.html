<!DOCTYPE html>
<html>
<head>
    <title>Catalog</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-dark p-2">
  <span class="navbar-brand">Shop</span>
  <div>
    <a href="login.html" class="text-white me-3">Login</a>
    <a href="register.html" class="text-white me-3">Register</a>
    <a href="cart.html" class="text-white">Cart</a>
  </div>
</nav>

<div class="container mt-4">
  <h2 class="text-center mb-3">Product Catalog</h2>

  <div class="row">
    <div class="col-md-4 col-sm-6 mb-3">
      <div class="card p-3 text-center">
        <h5>Product 1</h5>
        <p>₹500</p>
        <button class="btn btn-primary" onclick="add('Product 1',500)">Add</button>
      </div>
    </div>

    <div class="col-md-4 col-sm-6 mb-3">
      <div class="card p-3 text-center">
        <h5>Product 2</h5>
        <p>₹700</p>
        <button class="btn btn-primary" onclick="add('Product 2',700)">Add</button>
      </div>
    </div>

    <div class="col-md-4 col-sm-6 mb-3">
      <div class="card p-3 text-center">
        <h5>Product 3</h5>
        <p>₹1000</p>
        <button class="btn btn-primary" onclick="add('Product 3',1000)">Add</button>
      </div>
    </div>
  </div>
</div>

<script>
function add(n,p){
  let c = JSON.parse(localStorage.c || "[]");
  c.push({n,p});
  localStorage.c = JSON.stringify(c);
  alert("Added to cart");
}
</script>

</body>
</html>
