<!DOCTYPE html>
<html>
<head>
    <title>Cart</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-dark p-2">
  <span class="navbar-brand">Shop</span>
  <a href="catalog.html" class="text-white">Back</a>
</nav>

<div class="container mt-4">
  <h2>Your Cart</h2>

  <div id="list"></div>

  <h4 id="total" class="mt-3"></h4>
</div>

<script>
let c = JSON.parse(localStorage.c || "[]");
let s = "", t = 0;

c.forEach(i=>{
  s += '<div class="card p-2 mb-2">'+i.n+' - ₹'+i.p+'</div>';
  t += i.p;
});

document.getElementById("list").innerHTML = s;
document.getElementById("total").innerText = "Total: ₹"+t;
</script>

</body>
</html>
